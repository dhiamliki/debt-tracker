server:
  # Trust proxy headers (X-Forwarded-Host/Proto) from nginx so Spring builds
  # OAuth2 redirect_uri with the public host instead of the internal backend host.
  forward-headers-strategy: framework

spring:
  application:
    name: debt-tracker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  frontend-url: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production}
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${app.frontend-url}