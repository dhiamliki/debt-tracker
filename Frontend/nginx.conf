server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve the React SPA; fall back to index.html so React Router routes work.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend container by its compose service name.
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port 3000;
  }

  # OAuth2 authorization start — Spring serves this at /oauth2/authorize/*.
  # Scoped to /authorize/ (not all of /oauth2/) so /oauth2/callback stays on
  # the SPA, which is a React Router route, not a backend endpoint.
  location /oauth2/authorize/ {
    proxy_pass http://backend:8080/oauth2/authorize/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port 3000;
  }

  # OAuth2 provider redirect target (Spring's fixed /login/oauth2/code/*).
  location /login/oauth2/ {
    proxy_pass http://backend:8080/login/oauth2/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port 3000;
  }
}
